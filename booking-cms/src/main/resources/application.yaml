spring:
  application:
    name: booking-cms
  datasource:
    url: jdbc:postgresql://localhost:5432/movie_db
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true